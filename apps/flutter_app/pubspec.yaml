name: aetherpredict_flutter
description: AetherPredict Flutter client for web, Android, and iOS.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  web_socket_channel: ^2.4.5
  walletconnect_flutter_v2: ^2.2.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
