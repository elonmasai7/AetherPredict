name: AetherPredict CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
      - name: Lint backend
        run: python -m compileall apps/backend/app

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install AI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ai-service/requirements.txt
      - name: Lint AI service
        run: python -m compileall apps/ai-service/app

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
      - name: Get Flutter packages
        run: |
          cd apps/flutter_app
          flutter pub get
      - name: Analyze Flutter app
        run: |
          cd apps/flutter_app
          flutter analyze

  strategy-engine-web-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aetherpredict
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aetherpredict"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
      - name: Install browser tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-driver chromium || sudo apt-get install -y chromium-chromedriver chromium-browser
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install -r apps/ai-service/requirements.txt
      - name: Get Flutter packages
        run: |
          cd apps/flutter_app
          flutter pub get
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/aetherpredict
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd apps/backend
          python -m alembic upgrade head
      - name: Start AI service
        env:
          APP_ENV: ci
        run: |
          cd apps/ai-service
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8010 >/tmp/aetherpredict-ai.log 2>&1 &
      - name: Start backend
        env:
          APP_ENV: ci
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/aetherpredict
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
          CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
          API_DOCS_ENABLED: "false"
          AI_SERVICE_URL: http://localhost:8010
        run: |
          cd apps/backend
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 >/tmp/aetherpredict-backend.log 2>&1 &
      - name: Wait for services
        run: |
          for attempt in $(seq 1 60); do
            curl -sS http://localhost:8000/health >/dev/null && curl -sS http://localhost:8010/health >/dev/null && exit 0
            sleep 2
          done
          echo "Backend or AI service failed to start"
          cat /tmp/aetherpredict-backend.log || true
          cat /tmp/aetherpredict-ai.log || true
          exit 1
      - name: Run Strategy Engine browser smoke flow
        env:
          API_BASE_URL: http://localhost:8000
          CHROMEDRIVER_BIN: /usr/bin/chromedriver
        run: |
          cd apps/flutter_app
          ./scripts/run_web_strategy_engine_integration.sh

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run forge tests
        run: |
          cd apps/contracts
          forge test
