services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aetherpredict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/aetherpredict
      REDIS_URL: redis://redis:6379/0
      HASHKEY_RPC_FALLBACKS: "[]"
      VAULT_AUTO_EXECUTE_DEFAULT_SLUGS: "[]"
      VAULT_AUTO_EXECUTE_ALLOWLIST_IDS: "[]"
      VAULT_AUTO_EXECUTE_ALLOWLIST_MANAGER_ROLES: "[]"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "8010:8010"

volumes:
  postgres_data:
